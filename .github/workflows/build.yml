name: CI

permissions:
  contents: write

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [main]
    tags: ["*"]

  pull_request:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      ReleaseType:
        description: "Release or Debug"
        required: true
        default: "Release"

jobs:
  Build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest
            architecture: x64
          - os: windows-latest
            architecture: x86
          - os: windows-latest
            architecture: ARM64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        if: matrix.os == 'windows-latest'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build source package
        if: matrix.os == 'windows-latest' && matrix.architecture == 'x64'
        run: dotnet pack -c Release ImGui.NET.SourceBuild.csproj
        shell: bash

      - name: Upload source package
        uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest' && matrix.architecture == 'x64'
        with:
          name: win-x64-source
          path: bin\Packages\Release\*.nupkg

      - name: Publish untagged source package to MyGet
        if: matrix.os == 'windows-latest' && github.ref == 'refs/heads/main' && matrix.architecture == 'x64'
        run: dotnet nuget push bin\Packages\Release\*.nupkg -s https://www.myget.org/F/mellinoe/api/v3/index.json --api-key ${{secrets.MYGET_KEY}}
        # error can be fixed afterwards and job can be re-triggered
        continue-on-error: true

      - name: Publish tagged source package release to nuget.org
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/') && matrix.architecture == 'x64'
        run: dotnet nuget push bin\Packages\Release\*.nupkg -s https://api.nuget.org/v3/index.json --api-key ${{secrets.NUGET_KEY}}
        # error can be fixed afterwards and job can be re-triggered
        continue-on-error: true

      - name: Build all libraries ${{ github.event.inputs.ReleaseType || 'Release' }}
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./ci-build.cmd ${{ github.event.inputs.ReleaseType || 'Release' }} ${{ matrix.architecture }}
          else
            ./ci-build.sh ${{ github.event.inputs.ReleaseType || 'Release' }}
          fi
        shell: bash

      - name: Upload win-${{ matrix.architecture }} ${{ github.event.inputs.ReleaseType || 'Release' }}
        uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest'
        with:
          name: win-${{ matrix.architecture }}
          path: |
            cimgui/build/${{ matrix.architecture }}/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dll
            cimplot/build/${{ matrix.architecture }}/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dll
            cimplot3d/build/${{ matrix.architecture }}/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dll
            cimnodes/build/${{ matrix.architecture }}/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dll
            cimnodes_r/build/${{ matrix.architecture }}/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dll
            cimguizmo/build/${{ matrix.architecture }}/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dll
            cimguizmo_quat/build/${{ matrix.architecture }}/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dll
            cimCTE/build/${{ matrix.architecture }}/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dll

      - name: Upload ${{ matrix.os }} ${{ github.event.inputs.ReleaseType || 'Release' }}
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        with:
          name: ${{ matrix.os }}-x64
          path: |
            cimgui/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.so
            cimgui/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dylib
            cimplot/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.so
            cimplot/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dylib
            cimplot3d/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.so
            cimplot3d/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dylib
            cimnodes/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.so
            cimnodes/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dylib
            cimnodes_r/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.so
            cimnodes_r/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dylib
            cimguizmo/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.so
            cimguizmo/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dylib
            cimguizmo_quat/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.so
            cimguizmo_quat/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dylib
            cimCTE/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.so
            cimCTE/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*.dylib

      - name: Upload Json Files
        uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest' && matrix.architecture == 'x64'
        with:
          name: JsonFiles
          path: |
            cimgui/generator/output/*.json
            cimplot/generator/output/*.json
            cimplot3d/generator/output/*.json
            cimnodes/generator/output/*.json
            cimnodes_r/generator/output/*.json
            cimguizmo/generator/output/*.json
            cimguizmo_quat/generator/output/*.json
            cimCTE/generator/output/*.json

  CreateReleaseOnTagCreate:
    runs-on: ubuntu-latest
    needs: [Build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Rename win artifacts
        run: |
          for lib in cimgui cimplot cimplot3d cimnodes cimnodes_r cimguizmo cimguizmo_quat cimCTE; do
            for arch in x64 x86 ARM64; do
              suffix=$(echo $arch | tr '[:upper:]' '[:lower:]')
              src="win-${arch}/${lib}.dll"
              dst="win-${arch}/${lib}.win-${suffix}.dll"
              if [ -f "$src" ]; then mv "$src" "$dst"; fi
            done
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            win-x64/*.win-x64.dll
            win-x86/*.win-x86.dll
            win-ARM64/*.win-arm64.dll
            JsonFiles/*
            ubuntu-latest-x64/*.so
            macos-latest-x64/*.dylib
