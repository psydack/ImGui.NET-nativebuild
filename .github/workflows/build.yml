name: CI

permissions:
  contents: write

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [main]
    tags: ["*"]

  pull_request:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      ReleaseType:
        description: "Release or Debug"
        required: true
        default: "Release"

jobs:
  Build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest
            architecture: x64
          - os: windows-latest
            architecture: x86
          - os: windows-latest
            architecture: ARM64

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        if: matrix.os == 'windows-latest'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build source package
        if: matrix.os == 'windows-latest' && matrix.architecture == 'x64'
        run: dotnet pack -c Release ImGui.NET.SourceBuild.csproj
        shell: bash

      - name: Upload source package
        uses: actions/upload-artifact@v7
        if: matrix.os == 'windows-latest' && matrix.architecture == 'x64'
        with:
          name: win-x64-source
          path: bin\Packages\Release\*.nupkg

      - name: Publish untagged source package to MyGet
        if: matrix.os == 'windows-latest' && github.ref == 'refs/heads/main' && matrix.architecture == 'x64'
        run: dotnet nuget push bin\Packages\Release\*.nupkg -s https://www.myget.org/F/mellinoe/api/v3/index.json --api-key ${{secrets.MYGET_KEY}}
        # error can be fixed afterwards and job can be re-triggered
        continue-on-error: true

      - name: Publish tagged source package release to nuget.org
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/') && matrix.architecture == 'x64'
        run: dotnet nuget push bin\Packages\Release\*.nupkg -s https://api.nuget.org/v3/index.json --api-key ${{secrets.NUGET_KEY}}
        # error can be fixed afterwards and job can be re-triggered
        continue-on-error: true

      - name: Install FreeType (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libfreetype-dev

      - name: Install FreeType (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install freetype

      - name: Install FreeType (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          arch="${{ matrix.architecture }}"
          triplet="$(echo "$arch" | tr '[:upper:]' '[:lower:]')-windows-static"
          vcpkg install "freetype:${triplet}"

      - name: Build all libraries ${{ github.event.inputs.ReleaseType || 'Release' }}
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./ci-build.cmd ${{ github.event.inputs.ReleaseType || 'Release' }} ${{ matrix.architecture }}
          else
            ./ci-build.sh ${{ github.event.inputs.ReleaseType || 'Release' }}
          fi
        shell: bash

      - name: Stage win-${{ matrix.architecture }} artifacts
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail

          config="${{ github.event.inputs.ReleaseType || 'Release' }}"
          arch="${{ matrix.architecture }}"
          suffix="$(echo "$arch" | tr '[:upper:]' '[:lower:]')"
          mkdir -p "artifacts/win-${suffix}"

          for lib in cimgui cimplot cimplot3d cimnodes cimnodes_r cimguizmo cimguizmo_quat cimCTE; do
            src="${lib}/build/${arch}/${config}/${lib}.dll"
            if [ ! -f "$src" ]; then
              echo "Missing expected artifact: $src" >&2
              exit 1
            fi

            cp "$src" "artifacts/win-${suffix}/${lib}.win-${suffix}.dll"
          done

      - name: Stage ${{ matrix.os }} artifacts
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail

          config="${{ github.event.inputs.ReleaseType || 'Release' }}"
          if [ "$RUNNER_OS" == "macOS" ]; then
            platform="macos-universal"
            extension="dylib"
          else
            platform="linux-x64"
            extension="so"
          fi

          mkdir -p "artifacts/${platform}"

          for lib in cimgui cimplot cimplot3d cimnodes cimnodes_r cimguizmo cimguizmo_quat cimCTE; do
            src="${lib}/build/${config}/${lib}.${extension}"
            if [ ! -f "$src" ]; then
              echo "Missing expected artifact: $src" >&2
              exit 1
            fi

            cp "$src" "artifacts/${platform}/${lib}.${platform}.${extension}"
          done

      - name: Stage Json files
        if: matrix.os == 'windows-latest' && matrix.architecture == 'x64'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts/json

          for lib in cimgui cimplot cimplot3d cimnodes cimnodes_r cimguizmo cimguizmo_quat cimCTE; do
            src_dir="${lib}/generator/output"
            if [ ! -d "$src_dir" ]; then
              echo "Missing expected json directory: $src_dir" >&2
              exit 1
            fi

            mkdir -p "artifacts/json/${lib}"
            cp "${src_dir}"/*.json "artifacts/json/${lib}/"
          done

      - name: Verify cimgui exports
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            lib="cimgui/build/${{ matrix.architecture }}/${{ github.event.inputs.ReleaseType || 'Release' }}/cimgui.dll"
            bash scripts/check-exports.sh --freetype "$lib"
          elif [ "$RUNNER_OS" == "macOS" ]; then
            bash scripts/check-exports.sh "cimgui/build/${{ github.event.inputs.ReleaseType || 'Release' }}/cimgui.dylib"
          else
            bash scripts/check-exports.sh --freetype "cimgui/build/${{ github.event.inputs.ReleaseType || 'Release' }}/cimgui.so"
          fi

      - name: Run functional tests
        if: matrix.os == 'windows-latest' && matrix.architecture == 'x64'
        shell: bash
        env:
          CIMGUI_NATIVE_PATH: cimgui/build/x64/${{ github.event.inputs.ReleaseType || 'Release' }}/cimgui.dll
        run: dotnet test tests/ImGuiNativeTests/ -c Release --logger "console;verbosity=normal"

      - name: Upload win-${{ matrix.architecture }} ${{ github.event.inputs.ReleaseType || 'Release' }}
        uses: actions/upload-artifact@v7
        if: matrix.os == 'windows-latest'
        with:
          name: win-${{ matrix.architecture }}
          if-no-files-found: error
          path: artifacts/win-*/**

      - name: Upload ${{ matrix.os }} ${{ github.event.inputs.ReleaseType || 'Release' }}
        uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        with:
          name: ${{ matrix.os }}-x64
          if-no-files-found: error
          path: artifacts/*/**

      - name: Upload Json Files
        uses: actions/upload-artifact@v7
        if: matrix.os == 'windows-latest' && matrix.architecture == 'x64'
        with:
          name: JsonFiles
          if-no-files-found: error
          path: artifacts/json/**

  CreateReleaseOnTagCreate:
    runs-on: ubuntu-latest
    needs: [Build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8

      - name: Prepare release assets
        run: |
          set -euo pipefail

          mkdir -p release-assets

          for lib in cimgui cimplot cimplot3d cimnodes cimnodes_r cimguizmo cimguizmo_quat cimCTE; do
            mkdir -p "release-assets/${lib}"

            cp "win-x64/win-x64/${lib}.win-x64.dll" "release-assets/${lib}/"
            cp "win-x86/win-x86/${lib}.win-x86.dll" "release-assets/${lib}/"
            cp "win-ARM64/win-arm64/${lib}.win-arm64.dll" "release-assets/${lib}/"
            cp "ubuntu-latest-x64/linux-x64/${lib}.linux-x64.so" "release-assets/${lib}/"
            cp "macos-latest-x64/macos-universal/${lib}.macos-universal.dylib" "release-assets/${lib}/"

            if [ -d "JsonFiles/${lib}" ]; then
              cp "JsonFiles/${lib}"/*.json "release-assets/${lib}/"
            fi

            (
              cd "release-assets"
              zip -r "${lib}.zip" "${lib}"
            )

            if [ "$lib" = "cimgui" ]; then
              cp "release-assets/${lib}/cimgui.win-x64.dll" "release-assets/cimgui.win-x64.dll"
              cp "release-assets/${lib}/cimgui.win-x86.dll" "release-assets/cimgui.win-x86.dll"
              cp "release-assets/${lib}/cimgui.win-arm64.dll" "release-assets/cimgui.win-arm64.dll"
              cp "release-assets/${lib}/cimgui.linux-x64.so" "release-assets/cimgui.so"
              cp "release-assets/${lib}/cimgui.macos-universal.dylib" "release-assets/cimgui.dylib"
              cp "release-assets/${lib}/definitions.json" "release-assets/definitions.json"
              cp "release-assets/${lib}/structs_and_enums.json" "release-assets/structs_and_enums.json"
            fi
          done

          find release-assets -maxdepth 1 -type f -print | sort

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          files: |
            release-assets/*.zip
            release-assets/cimgui.win-x64.dll
            release-assets/cimgui.win-x86.dll
            release-assets/cimgui.win-arm64.dll
            release-assets/cimgui.so
            release-assets/cimgui.dylib
            release-assets/definitions.json
            release-assets/structs_and_enums.json
